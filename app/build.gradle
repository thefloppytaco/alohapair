plugins {
    id 'com.android.application'
}

android {
    namespace 'com.thefloppytaco.alohapair'
    compileSdk 34

    defaultConfig {
        applicationId "com.thefloppytaco.alohapair"
        minSdk 21
        targetSdk 28
        versionCode 3
        versionName "1.2"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}
